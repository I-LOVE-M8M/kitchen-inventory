<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>廚房食材管理系統</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #2c3e50; }
    .container { display: flex; gap: 20px; }
    .section { border: 1px solid #ccc; padding: 10px; width: 300px; }
    .item { margin: 5px 0; }
    label { display: block; margin-top: 10px; }
    input, select { width: 100%; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; }
    .actions { margin-left: 10px; }
  </style>
</head>
<body>
  <h1>廚房食材管理系統</h1>

  <div class="container">
    <div class="section">
      <h2>冰箱</h2>
      <ul id="fridge-list"></ul>
    </div>
    <div class="section">
      <h2>乾末庫</h2>
      <ul id="storage-list"></ul>
    </div>
  </div>

  <h2>新增食材</h2>
  <form id="add-form">
    <label>食材名稱：<input type="text" id="name" required></label>
    <label>重量/數量：<input type="text" id="amount" required></label>
    <label>保存期限：<input type="date" id="expiry" required></label>
    <label>位置：
      <select id="location">
        <option value="fridge">冰箱</option>
        <option value="storage">乾末庫</option>
      </select>
    </label>
    <button type="submit">新增</button>
  </form>

  <script>
    const fridgeList = document.getElementById('fridge-list');
    const storageList = document.getElementById('storage-list');
    const form = document.getElementById('add-form');

    let items = []; // 食材清單

    function renderList() {
      fridgeList.innerHTML = "";
      storageList.innerHTML = "";

      items.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = 'item';
        li.textContent = `${item.name} - ${item.amount} (期限: ${item.expiry})`;

        // 建立操作按鈕
        const actions = document.createElement('span');
        actions.className = 'actions';

        const editBtn = document.createElement('button');
        editBtn.textContent = "編輯";
        editBtn.onclick = () => {
          document.getElementById('name').value = item.name;
          document.getElementById('amount').value = item.amount;
          document.getElementById('expiry').value = item.expiry;
          document.getElementById('location').value = item.location;
          items.splice(index, 1); // 先移除，修改後再新增
          renderList();
        };

        const delBtn = document.createElement('button');
        delBtn.textContent = "刪除";
        delBtn.onclick = () => {
          items.splice(index, 1);
          renderList();
        };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        li.appendChild(actions);

        if (item.location === 'fridge') {
          fridgeList.appendChild(li);
        } else {
          storageList.appendChild(li);
        }
      });
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const amount = document.getElementById('amount').value;
      const expiry = document.getElementById('expiry').value;
      const location = document.getElementById('location').value;

      items.push({ name, amount, expiry, location });
      renderList();
      form.reset();
    });
  </script>
</body>
</html>
