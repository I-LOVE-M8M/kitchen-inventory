<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>廚房食材管理系統</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #2c3e50; }
    .container { display: flex; gap: 20px; }
    .section { border: 1px solid #ccc; padding: 10px; width: 300px; }
    .item { margin: 5px 0; }
    .item.expiring { color: red; font-weight: bold; } /* 快到期提醒 */
    label { display: block; margin-top: 10px; }
    input, select { width: 100%; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; }
    .actions { margin-left: 10px; }
  </style>
</head>
<body>
  <h1>廚房食材管理系統</h1>

  <div class="container">
    <div class="section">
      <h2>冰箱</h2>
      <ul id="fridge-list"></ul>
    </div>
    <div class="section">
      <h2>乾末庫</h2>
      <ul id="storage-list"></ul>
    </div>
  </div>

  <h2>新增食材</h2>
  <form id="add-form">
    <label>食材名稱：<input type="text" id="name" required></label>
    <label>重量/數量：<input type="text" id="amount" required></label>
    <label>保存期限：<input type="date" id="expiry" required></label>
    <label>位置：
      <select id="location">
        <option value="fridge">冰箱</option>
        <option value="storage">乾末庫</option>
      </select>
    </label>
    <button type="submit">新增</button>
  </form>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, Timestamp } 
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDOzYayn2PmFJGLEqQ2S7Sy_ullVVg1ae8",
      authDomain: "kitchen-c242c.firebaseapp.com",
      projectId: "kitchen-c242c",
      storageBucket: "kitchen-c242c.firebasestorage.app",
      messagingSenderId: "931549279934",
      appId: "1:931549279934:web:c2717b3f681e7a154e50ef",
      measurementId: "G-S8LG9J01CX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const fridgeList = document.getElementById('fridge-list');
    const storageList = document.getElementById('storage-list');
    const form = document.getElementById('add-form');

    let editingId = null;

    function renderList(items) {
      fridgeList.innerHTML = "";
      storageList.innerHTML = "";

      items.forEach((item) => {
        const li = document.createElement('li');
        li.className = 'item';

        // 轉換 Firestore Timestamp 或字串
        const expiryDate = item.expiry.toDate ? item.expiry.toDate() : new Date(item.expiry);
        li.textContent = `${item.name} - ${item.amount} (期限: ${expiryDate.toISOString().split("T")[0]})`;

        // 🔴 快到期提醒：剩 3 天以內顯示紅色
        const today = new Date();
        const diffDays = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
        if (diffDays <= 3) {
          li.classList.add("expiring");
        }

        const actions = document.createElement('span');
        actions.className = 'actions';

        const editBtn = document.createElement('button');
        editBtn.textContent = "編輯";
        editBtn.onclick = () => {
          document.getElementById('name').value = item.name;
          document.getElementById('amount').value = item.amount;
          document.getElementById('expiry').value = expiryDate.toISOString().split("T")[0];
          document.getElementById('location').value = item.location;
          editingId = item.id;
        };

        const delBtn = document.createElement('button');
        delBtn.textContent = "刪除";
        delBtn.onclick = async () => {
          await deleteDoc(doc(db, "ingredients", item.id));
        };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        li.appendChild(actions);

        if (item.location === 'fridge') {
          fridgeList.appendChild(li);
        } else {
          storageList.appendChild(li);
        }
      });
    }

    onSnapshot(collection(db, "ingredients"), (snapshot) => {
      const items = [];
      snapshot.forEach((docSnap) => {
        items.push({ id: docSnap.id, ...docSnap.data() });
      });
      renderList(items);
    });

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const amount = document.getElementById('amount').value;
      const expiry = document.getElementById('expiry').value;
      const location = document.getElementById('location').value;

      if (editingId) {
        await updateDoc(doc(db, "ingredients", editingId), {
          name,
          amount,
          expiry: Timestamp.fromDate(new Date(expiry)), // ✅ 改成 Timestamp
          location,
          updatedAt: new Date()
        });
        editingId = null;
      } else {
        await addDoc(collection(db, "ingredients"), {
          name,
          amount,
          expiry: Timestamp.fromDate(new Date(expiry)), // ✅ 改成 Timestamp
          location,
          createdAt: new Date()
        });
      }

      form.reset();
    });
  </script>
</body>
</html>
