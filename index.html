<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>廚房食材管理系統</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #2c3e50; }
    .container { display: flex; flex-wrap: wrap; gap: 20px; }
    .section { border: 1px solid #ccc; padding: 10px; width: 250px; flex: 1 1 250px; }
    .item { margin: 5px 0; }
    .item.expiring { color: red; font-weight: bold; }
    label { display: block; margin-top: 10px; }
    input, select { width: 100%; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; }
    .actions { margin-left: 10px; }
    #search { margin: 15px 0; padding: 5px; width: 300px; }

    .card-mode .item {
      border: 1px solid #aaa;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      background: #f9f9f9;
    }

    @media (max-width: 600px) {
      .section { flex: 1 1 100%; max-width: 100%; }
      #search { width: 100%; }
      form { width: 100%; }
      input, select, button { font-size: 16px; }
    }
  </style>
</head>
<body>
  <h1>廚房食材管理系統</h1>

  <input type="text" id="search" placeholder="輸入食材名稱搜尋...">
  <button id="toggleMode">切換顯示模式</button>

  <div class="container" id="sections"></div>

  <h2>新增食材</h2>
  <form id="add-form">
    <label>食材名稱：<input type="text" id="name" required></label>
    <label>重量/數量：<input type="text" id="amount" required></label>
    <label>保存期限：<input type="date" id="expiry" required></label>
    <label>位置：
      <select id="location">
        <option value="fridge-1">冰箱1</option>
        <option value="fridge-2">冰箱2</option>
        <option value="fridge-3">冰箱3</option>
        <option value="fridge-4">冰箱4</option>
        <option value="fridge-5">冰箱5</option>
        <option value="storage-1">糧秣庫1</option>
        <option value="storage-2">糧秣庫2</option>
      </select>
    </label>
    <button type="submit">新增</button>
  </form>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, Timestamp } 
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDOzYayn2PmFJGLEqQ2S7Sy_ullVVg1ae8",
      authDomain: "kitchen-c242c.firebaseapp.com",
      projectId: "kitchen-c242c",
      storageBucket: "kitchen-c242c.firebasestorage.app",
      messagingSenderId: "931549279934",
      appId: "1:931549279934:web:c2717b3f681e7a154e50ef",
      measurementId: "G-S8LG9J01CX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const sectionsDiv = document.getElementById('sections');
    const form = document.getElementById('add-form');
    const searchInput = document.getElementById('search');
    const toggleBtn = document.getElementById('toggleMode');

    let editingId = null;
    let allItems = [];
    let cardMode = false;

    const locations = ["fridge-1","fridge-2","fridge-3","fridge-4","fridge-5","storage-1","storage-2"];
    const sectionElements = {};
    locations.forEach(loc => {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = `<h2>${loc.includes("fridge") ? "冰箱" : "糧秣庫"} ${loc.split("-")[1]}</h2><ul id="${loc}-list"></ul>`;
      sectionsDiv.appendChild(section);
      sectionElements[loc] = section.querySelector('ul');
    });

    function renderList(items) {
      locations.forEach(loc => sectionElements[loc].innerHTML = "");

      items.forEach((item) => {
        console.log("顯示位置:", item.location, "是否存在:", !!sectionElements[item.location]);

        const li = document.createElement('li');
        li.className = 'item';

        const expiryDate = item.expiry.toDate ? item.expiry.toDate() : new Date(item.expiry);
        li.textContent = `${item.name} - ${item.amount} (期限: ${expiryDate.toISOString().split("T")[0]})`;

        const today = new Date();
        const diffDays = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
        if (diffDays <= 3) li.classList.add("expiring");

        const actions = document.createElement('span');
        actions.className = 'actions';

        const editBtn = document.createElement('button');
        editBtn.textContent = "編輯";
        editBtn.onclick = () => {
          document.getElementById('name').value = item.name;
          document.getElementById('amount').value = item.amount;
          document.getElementById('expiry').value = expiryDate.toISOString().split("T")[0];
          document.getElementById('location').value = item.location;
          editingId = item.id;
        };

        const delBtn = document.createElement('button');
        delBtn.textContent = "刪除";
        delBtn.onclick = async () => {
          await deleteDoc(doc(db, "ingredients", item.id));
        };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);
        li.appendChild(actions);

        if (sectionElements[item.location]) {
          sectionElements[item.location].appendChild(li);
        } else {
          console.warn("⚠️ 找不到區塊:", item.location);
        }
      });

      if (cardMode) {
        sectionsDiv.classList.add("card-mode");
      } else {
        sectionsDiv.classList.remove("card-mode");
      }
    }

    onSnapshot(collection(db, "ingredients"), (snapshot) => {
      allItems = [];
      snapshot.forEach((docSnap) => {
        allItems.push({ id: docSnap.id, ...docSnap.data() });
      });

      allItems.sort((a, b) => {
        const dateA = a.expiry.toDate ? a.expiry.toDate() : new Date(a.expiry);
        const dateB = b.expiry.toDate ? b.expiry.toDate() : new Date(b.expiry);
        return dateA - dateB;
      });

      renderList(allItems);
    });

    searchInput.addEventListener('input', () => {
      const keyword = searchInput.value.toLowerCase();
      const filtered = allItems.filter(item => item.name.toLowerCase().includes(keyword));
      renderList(filtered);
    });

    toggleBtn.addEventListener('click', () => {
      cardMode = !cardMode;
      renderList(allItems);
    });

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const amount = document.getElementById('amount').value;
      const expiry = document.getElementById('expiry').value;
      const location = document.getElementById('location').value;

      if (editingId) {
        await updateDoc(doc(db, "ingredients", editingId), {
          name,
          amount,
          expiry: Timestamp.fromDate(new Date(expiry)),
          location,
          updatedAt: new Date()
        });
        editingId = null;
      } else {
        await addDoc(collection(db, "ingredients"), {
          name,
          amount,
          expiry: Timestamp.fromDate(new Date(expiry)),
          location,
          createdAt: new Date()
        });
      }
